<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하엘의 영단어 공부노트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            margin: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #0f172a; /* 보내주신 이미지와 비슷한 다크 배경 */
            color: #f8fafc; 
            overflow-y: auto; 
            min-height: 100vh;
        }
        
        .container { 
            max-width: 450px; 
            margin: 0 auto; 
            padding: 10px;
            padding-bottom: 80px; /* 하단 여백 대폭 강화 */
        }

        .screen { display: none; flex-direction: column; width: 100%; }
        .active { display: flex; }

        /* 안드로이드 배려: 상단 여백 축소 */
        .main-header { 
            text-align: center; 
            padding: 30px 15px; 
            background: #1e293b; 
            border-radius: 25px; 
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .main-icon { font-size: 40px; margin-bottom: 5px; }
        .main-title { font-size: 22px; font-weight: 900; color: #818cf8; margin: 0; }

        /* 버튼 크기 최적화 (안드로이드에서 안 잘리게 슬림하게) */
        .btn { 
            border: none; border-radius: 12px; padding: 15px; font-size: 16px; 
            font-weight: bold; cursor: pointer; transition: 0.2s; 
            margin-bottom: 10px; width: 100%; display: block;
        }
        .btn-choice { background: #4f46e5; color: white; }
        .btn-typing { background: #0284c7; color: white; }
        .btn-study { background: #334155; color: white; }
        .btn:active { transform: scale(0.98); }

        .progress-container { background: #334155; border-radius: 5px; height: 6px; margin-bottom: 15px; }
        .progress-fill { background: #818cf8; height: 100%; width: 0%; transition: 0.3s; }

        /* 퀴즈 카드 슬림화 */
        .quiz-card { 
            background: #1e293b; 
            border-radius: 20px; 
            padding: 20px 10px; 
            text-align: center; 
            margin-bottom: 15px; 
            border: 1px solid #334155;
        }
        .quiz-word { font-size: 30px; font-weight: 900; color: #f8fafc; margin-bottom: 5px; }
        
        .btn-speak { background: #334155; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 16px; color: #818cf8; margin-bottom: 5px; }
        
        .choice-list { display: grid; gap: 8px; }
        .choice-item { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 12px; font-size: 15px; text-align: center; color: #cbd5e1; }
        .correct { background: #059669 !important; border-color: #059669 !important; color: white; }
        .wrong { background: #dc2626 !important; border-color: #dc2626 !important; color: white; }
        
        .input-word { width: 100%; padding: 14px; font-size: 16px; background: #0f172a; color: white; border: 2px solid #334155; border-radius: 12px; text-align: center; margin-bottom: 10px; }
        
        .example-box { 
            display: none; background: #0f172a; border-left: 3px solid #818cf8; 
            padding: 12px; text-align: left; margin-top: 10px; border-radius: 8px; font-size: 13px; 
        }
        
        .btn-next { display: none; background: #f8fafc; color: #0f172a; margin-top: 10px; }
        .btn-back { background: transparent; color: #64748b; font-size: 12px; margin-top: 15px; border: none; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-screen" class="screen active">
        <div class="main-header">
            <div class="main-icon">📖</div>
            <h1 class="main-title">하엘의 영단어 공부노트</h1>
        </div>
        <button class="btn btn-choice" onclick="unlockAudio(); startQuiz('choice')">객관식 퀴즈</button>
        <button class="btn btn-typing" onclick="unlockAudio(); startQuiz('typing')">주관식 도전</button>
        <button class="btn btn-study" onclick="unlockAudio(); startQuiz('study')">예문 학습</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 5px;">
            <span id="progress-info">01 / 20</span>
            <span id="score-info">SCORE: 0</span>
        </div>
        <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
        
        <div class="quiz-card">
            <button id="main-speaker" class="btn-speak" style="display:none;" onclick="speakCurrentWord()">🔊</button>
            <div id="question-word" class="quiz-word">Word</div>
            <div id="word-answer-peek" style="display:none; color:#818cf8; font-size:16px; font-weight:bold; margin-top:5px;">정답</div>
            
            <div id="example-box" class="example-box">
                <div style="color:#f1f5f9; font-style:italic; margin-bottom:4px;">
                    <span onclick="speakCurrentExample()">🔊</span> <span id="ex-en-text">Example</span>
                </div>
                <div id="ex-ko" style="color:#94a3b8;">해석</div>
            </div>
        </div>
        
        <div id="choices" class="choice-list"></div>
        
        <div id="typing-ui" style="display:none;">
            <input type="text" id="user-input" class="input-word" placeholder="정답 입력" autocomplete="off">
            <button class="btn btn-typing" onclick="checkTypingAnswer()">확인</button>
        </div>
        
        <div id="study-ui" style="display:none;">
            <button class="btn btn-choice" onclick="showStudyResult()">뜻 보기</button>
        </div>
        
        <button id="next-btn" class="btn btn-next" onclick="next()">다음 문제 👉</button>
        <button class="btn-back" onclick="location.reload()">처음으로</button>
    </div>
</div>

<script>
    /* 하엘님의 영단어 데이터베이스 */
    const allDatabase = [
        {w:"Reliable",m:"믿을 수 있는",ex:"He is a reliable friend.",exk:"그는 믿을 수 있는 친구다."},
        {w:"Gravity",m:"중력",ex:"Gravity pulls things down.",exk:"중력은 물체를 아래로 끌어당긴다."},
        {w:"Invite",m:"초대하다",ex:"Invite them to the party.",exk:"그들을 파티에 초대해라."},
        {w:"About",m:"~에 대해",ex:"Talk about it.",exk:"그것에 대해 말해라."},
        {w:"Again",m:"다시",ex:"Try again.",exk:"다시 시도해라."}
        /* 데이터는 이 형식으로 계속 추가하시면 됩니다! */
    ];

    let sessionWords = [];
    let current = 0;
    let score = 0;
    let quizMode = '';

    function unlockAudio() {
        const msg = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(msg);
    }

    function playTTS(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    function speakCurrentWord() { playTTS(sessionWords[current].w); }
    function speakCurrentExample() { playTTS(sessionWords[current].ex); }

    function startQuiz(mode) {
        quizMode = mode;
        current = 0; score = 0;
        sessionWords = [...allDatabase].sort(() => Math.random() - 0.5).slice(0, 20);
        document.getElementById('main-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        document.getElementById('choices').style.display = (mode === 'choice') ? 'grid' : 'none';
        document.getElementById('typing-ui').style.display = (mode === 'typing') ? 'block' : 'none';
        document.getElementById('study-ui').style.display = (mode === 'study') ? 'block' : 'none';
        showQuestion();
    }

    function showQuestion() {
        const q = sessionWords[current];
        const wordDisplay = document.getElementById('question-word');
        const peek = document.getElementById('word-answer-peek');
        const mainSpeaker = document.getElementById('main-speaker');
        peek.style.display = 'none';
        
        if (quizMode === 'typing') {
            wordDisplay.innerText = q.m;
            mainSpeaker.style.display = 'none';
        } else {
            wordDisplay.innerText = q.w;
            mainSpeaker.style.display = 'inline-flex';
        }
        
        document.getElementById('ex-en-text').innerText = q.ex;
        document.getElementById('ex-ko').innerText = q.exk;
        document.getElementById('example-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('progress-info').innerText = `${String(current + 1).padStart(2, '0')} / 20`;
        document.getElementById('score-info').innerText = `SCORE: ${score * 5}`;
        document.getElementById('progress-bar').style.width = `${((current + 1) / 20) * 100}%`;

        if (quizMode === 'choice') {
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            let options = [q.m];
            while(options.length < 4) {
                let randomM = allDatabase[Math.floor(Math.random()*allDatabase.length)].m;
                if(!options.includes(randomM)) options.push(randomM);
            }
            options.sort(() => Math.random() - 0.5);
            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'choice-item';
                div.innerText = opt;
                div.onclick = () => checkChoiceAnswer(div, opt, q.m);
                choicesDiv.appendChild(div);
            });
        }
        window.scrollTo(0, 0);
    }

    function checkChoiceAnswer(el, selected, correct) {
        const allChoices = document.querySelectorAll('.choice-item');
        allChoices.forEach(c => c.onclick = null);
        if (selected === correct) {
            el.classList.add('correct');
            score++;
            speakCurrentWord();
        } else {
            el.classList.add('wrong');
            allChoices.forEach(c => { if(c.innerText === correct) c.classList.add('correct'); });
        }
        showResult();
    }

    function checkTypingAnswer() {
        const input = document.getElementById('user-input');
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = sessionWords[current].w.toLowerCase();
        if(!userAnswer) return;
        input.readOnly = true;
        if (userAnswer === correctAnswer) {
            score++;
            speakCurrentWord();
        } else {
            document.getElementById('word-answer-peek').innerText = `정답: ${sessionWords[current].w}`;
            document.getElementById('word-answer-peek').style.display = 'block';
        }
        showResult();
    }

    function showStudyResult() {
        document.getElementById('word-answer-peek').innerText = `뜻: ${sessionWords[current].m}`;
        document.getElementById('word-answer-peek').style.display = 'block';
        document.getElementById('study-ui').style.display = 'none';
        speakCurrentWord();
        showResult();
    }

    function showResult() {
        document.getElementById('example-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
        // 안드로이드에서 버튼이 바로 보이게 스크롤
        setTimeout(() => { window.scrollBy({ top: 150, behavior: 'smooth' }); }, 100);
    }

    function next() {
        current++;
        if (current < 20) {
            if(quizMode === 'study') document.getElementById('study-ui').style.display = 'block';
            showQuestion();
        } else {
            alert(`🎉 완료! 총 ${score * 5}점을 얻었습니다!`);
            location.reload();
        }
    }
</script>

</body>
</html>
